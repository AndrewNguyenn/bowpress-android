# Suggested adjustments parity. iOS subtitle says "swipe left on a card
# to dismiss" and the row reveals a dismiss action on left swipe. Android
# previously said "tap for detail" and rows had no dismiss gesture.
# Iter 19 wires Material3 SwipeToDismissBox and matches iOS subtitle copy.
appId: ${APP_ID}
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000
- tapOn: "Analytics"
- waitForAnimationToEnd:
    timeout: 4000
- scroll
- scroll
- scroll
- scroll
- scroll
- waitForAnimationToEnd:
    timeout: 2000

# Section visible + subtitle copy matches iOS. Use a short substring
# (matchers choke on long line-wrapped Compose/SwiftUI Text nodes).
- assertVisible: "Suggested adjustments"
- assertVisible: ".*swipe left.*"

# Old Android-only hint is gone
- assertNotVisible: ".*tap for detail.*"
