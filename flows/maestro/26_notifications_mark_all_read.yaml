# Maestro flow: Notifications mark-all-read clears the FeedScreen bell badge.
#
# Dev mock data seeds the user with a handful of unread notifications
# (kudos / comments / mentions / league). This flow proves:
#   1. The bell icon in the FeedScreen top-nav opens the NotificationCenter.
#   2. The center renders the "Notifications" header + an unread count
#      ("N new") and a MARK ALL READ affordance when rows are unread.
#   3. Tapping MARK ALL READ collapses the unread count to "all caught up"
#      and the MARK ALL READ link disappears.
#   4. Returning to the feed leaves no notification badge on the bell.
#
# iOS oracle: NotificationCenterView.swift.
# DRAFT — the bell tap target and notification rows aren't tagged yet.
# The flow drives by visible labels which are identical across iOS +
# Android (per A1 parity work). The bell sits to the right of the F/C/L
# pills in the top-nav; we tap by its accessibility content description
# "Notifications" which both platforms expose.
#
# Caller passes appId + screenshot prefix via -e:
#   iOS:     maestro -e APP_ID=com.andrewnguyen.bowpress       -e SCREENSHOT_PREFIX=/tmp/ios-notifs     test flows/maestro/26_notifications_mark_all_read.yaml
#   Android: maestro --device emulator-5554 -e APP_ID=com.andrewnguyen.bowpress.debug -e SCREENSHOT_PREFIX=/tmp/android-notifs test flows/maestro/26_notifications_mark_all_read.yaml
appId: ${APP_ID}
tags:
  - parity
  - notifications
  - draft
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000

# Feed is the home tab (A1).
- tapOn: "Feed"
- waitForAnimationToEnd:
    timeout: 4000
- extendedWaitUntil:
    visible:
        id: "social_feed_root"
    timeout: 8000
- takeScreenshot: ${SCREENSHOT_PREFIX}_01_feed

# Tap the bell. The icon carries the contentDescription "Notifications"
# (FeedScreen.kt:485) which Maestro can target on both platforms.
- tapOn: "Notifications"
- waitForAnimationToEnd:
    timeout: 4000

# NotificationCenter is now on screen — the header text is literally
# "Notifications" (NotificationCenterScreen.kt:95). The unread strap
# beneath it reads "N new" when rows are unread.
- assertVisible: "Notifications"
- assertVisible:
    text: ".* new"
- assertVisible: "MARK ALL READ ›"
- takeScreenshot: ${SCREENSHOT_PREFIX}_02_unread

# Trip the bulk-read action.
- tapOn: "MARK ALL READ ›"
- waitForAnimationToEnd:
    timeout: 3000

# Now the eyebrow flips to "all caught up" and the bulk-read affordance
# is gone (NotificationCenterScreen.kt:97 + the `if (state.items.any
# { !it.read })` gate at :102).
- assertVisible: "all caught up"
- assertNotVisible: "MARK ALL READ ›"
- takeScreenshot: ${SCREENSHOT_PREFIX}_03_caught_up

# Back to feed via the "‹  Feed" back link.
- tapOn:
    text: ".*Feed"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
        id: "social_feed_root"
    timeout: 6000
- takeScreenshot: ${SCREENSHOT_PREFIX}_04_feed_no_badge
