# Maestro flow: Equipment tab — open a bow detail.
#
# Goal: verify the Equipment tab → bow row tap → bow detail navigation
# works identically on both platforms, and that a known-fixture bow's
# detail view renders the same primary fields.
#
# Steps exercised:
#   1. Launch + hydration wait
#   2. Tap Equipment tab — screenshot equipment list (3 bows / 2 arrows)
#   3. Tap "Mathews TITLE 36" row to open its detail
#   4. Assert the detail screen is visible (by bow name) — screenshot
#   5. Tap system back to return — screenshot equipment list again
#
# Caller passes appId + screenshot prefix via -e:
#   iOS:     maestro -e APP_ID=com.andrewnguyen.bowpress       -e SCREENSHOT_PREFIX=/tmp/ios-iter7-equip     test flows/maestro/02_equipment_open_bow.yaml
#   Android: maestro --device emulator-5554 -e APP_ID=com.andrewnguyen.bowpress.debug -e SCREENSHOT_PREFIX=/tmp/android-iter7-equip test flows/maestro/02_equipment_open_bow.yaml
appId: ${APP_ID}
tags:
  - parity
  - interaction
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000
- tapOn: "Equipment"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Mathews TITLE 36"
- takeScreenshot: ${SCREENSHOT_PREFIX}_01_equipment_list
- tapOn: "Mathews TITLE 36"
- waitForAnimationToEnd:
    timeout: 3000
# Bow name is the detail screen's title — appears on every detail layout.
# "Draw Length" is a Setup-section row label that both platforms render with
# identical case (no platform-specific text-style transform), so it's the
# robust cross-platform signal for "edit form is visible". Section header text
# is also asserted: iOS Form section title `Section("Setup")` exposes "Setup"
# as the underlying accessibility node; Android SectionHeader applies
# `.uppercase()` for Material styling so the rendered string is "SETUP". The
# row label assertion sidesteps that divergence.
- assertVisible: "Mathews TITLE 36"
- assertVisible: "Draw Length"
- takeScreenshot: ${SCREENSHOT_PREFIX}_02_bow_detail
# Interaction: tap Save and verify navigation returns to the equipment list.
# iOS BowDetailView.saveCurrentState calls dismiss() after persisting; Android
# BowDetailScreen now mirrors that with LaunchedEffect(savedConfigId) → onBack.
# After save we should land back on the Equipment tab with both rigs visible.
- tapOn: "Save"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Mathews TITLE 36"
- assertVisible: "Border HEX7 Barebow"
- takeScreenshot: ${SCREENSHOT_PREFIX}_03_after_save
