# Maestro flow: Range session FinishSheet (C1 bottom-sheet finalization).
#
# After a range session is plotted to completion, tapping "✓ Finish" raises
# the FinishSheet bottom-sheet (replaces the legacy alert). This flow proves:
#   1. The sheet opens with the expected section labels (TITLE, DESCRIPTION,
#      AUDIENCE) and section eyebrow ("SESSION COMPLETE").
#   2. The TITLE field accepts text input.
#   3. The DESCRIPTION field accepts text input.
#   4. The AUDIENCE chip toggles PUBLIC ↔ PRIVATE and back.
#   5. Saving via the primary CTA closes the sheet and returns the archer
#      to the post-session state (Log tab shows the new session).
#
# iOS oracle: FinishSheet.swift.
# DRAFT — most FinishSheet primitives don't yet carry stable testTags;
# this flow exercises by visible label / text. The session_notes_location_row
# tag is the one identifier wired today and is asserted as a structural
# anchor.
#
# Caller passes appId + screenshot prefix via -e (same shape as 03/11):
#   iOS:     maestro -e APP_ID=com.andrewnguyen.bowpress       -e SCREENSHOT_PREFIX=/tmp/ios-finish-range     test flows/maestro/24_session_finish_sheet_range.yaml
#   Android: maestro --device emulator-5554 -e APP_ID=com.andrewnguyen.bowpress.debug -e SCREENSHOT_PREFIX=/tmp/android-finish-range test flows/maestro/24_session_finish_sheet_range.yaml
appId: ${APP_ID}
tags:
  - parity
  - finish-sheet
  - draft
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000

# Begin a Range session — default config picked by the bow row.
- tapOn: "Session"
- waitForAnimationToEnd:
    timeout: 4000
- scrollUntilVisible:
    element:
        text: "Begin session"
    direction: DOWN
    timeout: 8000
- tapOn: "Begin session"
- waitForAnimationToEnd:
    timeout: 6000
- assertVisible:
    text: ".*IN SESSION.*"

# Plot three arrows. `target_plot` is the only stable id on the target view;
# repeated taps land near center, which is fine for a smoke-grade plot.
- tapOn:
    id: "target_plot"
- tapOn:
    id: "target_plot"
- tapOn:
    id: "target_plot"

# Trip the finish flow.
- tapOn: "✓ Finish"
- waitForAnimationToEnd:
    timeout: 4000

# Sheet header + section labels — these are the structural anchors that
# prove the FinishSheet (not the legacy EndSessionSheet alert) is open.
- assertVisible: "SESSION COMPLETE"
- assertVisible: "TITLE"
- assertVisible: "DESCRIPTION"
- assertVisible: "AUDIENCE"
- takeScreenshot: ${SCREENSHOT_PREFIX}_01_sheet_open

# Type a title. The title field is the first BasicTextField inside the
# sheet's verticalScroll Column; tapping the visible "Morning shooting
# session" / "Midday shooting session" placeholder focuses it. The
# placeholder copy is time-of-day dependent, so we tap the TITLE label
# anchor instead and the focus lands on the field below it.
- tapOn:
    text: "TITLE"
    index: 0
- inputText: "Test Range"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Test Range"

# Type a description.
- tapOn:
    text: "DESCRIPTION"
    index: 0
- inputText: "Smoke-test finish flow."
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Smoke-test finish flow."

# Audience toggle: PUBLIC is the default; tap PRIVATE then back to PUBLIC.
# The segmented chip labels are uppercased glyph + word.
- tapOn: "PRIVATE"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: ${SCREENSHOT_PREFIX}_02_private
- tapOn: "PUBLIC"
- waitForAnimationToEnd:
    timeout: 1000

# Save via the primary CTA. The button title is owned by FinishAudience
# (audience.primaryTitle) and reads "Share to feed" / "Save privately"
# depending on the selected audience. With PUBLIC selected we match the
# share copy.
- tapOn:
    text: ".*Share to feed.*|.*SHARE.*"
- waitForAnimationToEnd:
    timeout: 5000

# Sheet should be gone — assert by absence of the SESSION COMPLETE eyebrow.
- assertNotVisible: "SESSION COMPLETE"
- takeScreenshot: ${SCREENSHOT_PREFIX}_03_after_save
