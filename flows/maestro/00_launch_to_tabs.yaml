# Maestro flow: launch the app, wait for hydration to clear, assert the
# main tab bar exists. Runs identically against iOS Sim + Android Emulator.
#
# This is the cheapest cross-platform parity signal — proves both apps
# boot to the same scaffold. Maps to iOS XCUITest's ScreenshotTests.swift
# baseline ("tab bar never appeared (hydration splash stuck?)").
#
# Tab order (post-A1 Feed-home parity): Feed · Log · Session · Analytics
# · Equipment. Settings is no longer a top-level tab — it's reached via
# the avatar pill in the Feed top-nav. The bottom-bar labels render
# uppercase, so the assertions match that case.
#
# Prerequisites:
#   - iOS:     DEBUG build auto-signs in; main tab bar should appear
#              within 20s after splash clears.
#   - Android: DEBUG build does NOT yet auto-sign in (parity divergence,
#              BLOCKERS tracking). Will land on AuthScreen instead of
#              main_tab_bar — this flow will FAIL on Android until
#              auto-sign-in is wired to match iOS.
appId: com.andrewnguyen.bowpress
tags:
  - parity
  - smoke
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000
# NOTE: asserting tab bar via text labels rather than testTag/accessibilityID
# because iOS MainTabView's UITabBar doesn't expose `main_tab_bar` as an
# accessibilityIdentifier (only Android Compose does). Adding the iOS
# identifier for symmetry is tracked in BLOCKERS — until then text is the
# common signal on both platforms.
#
# Feed is the home tab (post-A1 parity), so it should be visible as soon
# as the splash clears. The remaining four tabs are always present on the
# bottom bar regardless of which is selected.
#
# Tab-bar labels render in different cases per platform (iOS uses title
# case via tabItem `Label`, Android uppercases in the bottom bar). Use
# regex with the case-insensitive flag so one assertion covers both.
- assertVisible:
    text: "(?i)^feed$"
- assertVisible:
    text: "(?i)^log$"
- assertVisible:
    text: "(?i)^session$"
- assertVisible:
    text: "(?i)^analytics$"
- assertVisible:
    text: "(?i)^equipment$"
