# Paywall subscriber-state parity — PARKED.
#
# This flow taps "View subscription plans" in Settings to reach the
# subscriber-branch paywall. While `FeatureFlags.MONETIZATION_ENABLED = false`
# (app is free for all users) the entry point is hidden, so the flow has no
# meaningful surface to assert on. When monetization comes back, restore
# the original body from git history (commit before this branch).
appId: ${APP_ID}
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000

# Parked: lock in that the subscriber entry point is hidden in free mode.
- tapOn: "Settings"
- assertNotVisible: "View subscription plans"
