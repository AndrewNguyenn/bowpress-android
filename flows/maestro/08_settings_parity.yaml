# Settings tab parity — iOS is the oracle.
# Verifies the iter-14 restructure: sentence-case labels, ON-state mono text
# next to the notifications toggle, Units row tap-to-toggle. The Subscription
# row and Group 3 (View subscription plans / Restore purchases) are hidden
# while `FeatureFlags.MONETIZATION_ENABLED = false` — the app is currently
# free for all users. Re-enable those assertions when monetization comes back.
appId: ${APP_ID}
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    notVisible:
        id: "hydration_splash"
    timeout: 20000
- tapOn: "Settings"
- waitForAnimationToEnd:
    timeout: 4000

# Sentence-case labels (matches iOS)
- assertVisible: "Push notifications"
- assertVisible: "Privacy policy"
- assertVisible: "Terms of service"
- assertVisible: "Sign out"

# Notification ON-state mono label
- assertVisible: "ON"

# Subscription rows hidden while the app is free.
- assertNotVisible: "Subscription"
- assertNotVisible: "View subscription plans"
- assertNotVisible: "unlock the full tuning engine"
- assertNotVisible: "Restore purchases"
- assertNotVisible: "Change Password"
- assertNotVisible: "Delete Account"

# Units row is now tap-to-toggle: imperial → metric → imperial.
- assertVisible: "IMPERIAL"
- tapOn: "Units"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "METRIC"
- tapOn: "Units"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "IMPERIAL"
