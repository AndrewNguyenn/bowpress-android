name: android-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run for the same ref when a newer commit lands.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-unit-test:
    name: build + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.head_ref != 'main' }}

      - name: Assemble debug APKs
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  flow-spec-parse:
    name: flow-spec parse (Robolectric-equivalent quick check)
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Validate flow JSON shapes
        run: |
          # Lightweight sanity gate: every flow file under flows/ must be
          # valid JSON and reference an existing fixture if one is named.
          python3 - <<'PY'
          import json, os, sys, glob
          repo_root = os.environ.get("GITHUB_WORKSPACE", ".")
          flow_dir = os.path.join(repo_root, "flows")
          fixtures = set(os.path.relpath(p, flow_dir)
                         for p in glob.glob(os.path.join(flow_dir, "fixtures", "*.json")))
          errors = []
          for path in sorted(glob.glob(os.path.join(flow_dir, "*.flow.json"))):
              name = os.path.relpath(path, flow_dir)
              with open(path) as f:
                  try:
                      doc = json.load(f)
                  except Exception as e:
                      errors.append(f"{name}: invalid JSON — {e}")
                      continue
              for k, v in (doc.get("fixtures") or {}).items():
                  rel = v
                  if rel.startswith("fixtures/") and rel not in fixtures:
                      errors.append(f"{name}: fixture not found — {rel}")
              for step in doc.get("steps", []):
                  if step.get("type") == "apiRespond":
                      bf = step.get("bodyFile")
                      if bf and bf not in fixtures:
                          errors.append(f"{name}: bodyFile not found — {bf}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"OK — {len(glob.glob(os.path.join(flow_dir, '*.flow.json')))} flow files validated")
          PY

  instrumented-test:
    name: instrumented tests (emulator)
    runs-on: ubuntu-latest
    needs: build-and-unit-test
    timeout-minutes: 60
    # The emulator job is heavyweight; gate it on the lighter checks
    # passing first. Skip on draft PRs to save time.
    if: github.event.pull_request.draft != true
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM (Linux runners)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD + warm cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
          retention-days: 14
